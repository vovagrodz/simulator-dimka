<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PROJECT D.I.M.K.A.</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07070f;--surface:#0f0f1e;--s2:#14142a;--s3:#1a1a30;
  --border:rgba(255,255,255,0.07);
  --accent:#9d4edd;--ac2:#ff4fa0;--ac3:#38bdf8;--gold:#fbbf24;
  --text:#e2e2f0;--muted:#5560a0;--dim:#3a3a70;
  --bubble-me:#5b21b6;--bubble-them:#1e1e3a;
  --font-ui:'Syne',sans-serif;--font-mono:'Space Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-ui)}
button{font-family:var(--font-ui);cursor:pointer}
input{font-family:var(--font-ui)}

/* ─── LAYOUT ─── */
#root{height:100vh;display:flex;flex-direction:column;max-width:500px;margin:0 auto;position:relative}

/* ─── SCREENS ─── */
.screen{display:none;flex-direction:column;height:100%;overflow:hidden}
.screen.active{display:flex}

/* ══════════════════════════════════
   INTRO
══════════════════════════════════ */
#s-intro{align-items:center;justify-content:center;text-align:center;padding:32px 24px;position:relative}
.intro-bg{position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(157,78,221,.18) 0%,transparent 70%),
             radial-gradient(ellipse 50% 60% at 80% 90%,rgba(255,79,160,.12) 0%,transparent 60%)}
.intro-city{width:100%;max-width:420px;margin:0 auto 28px;position:relative;z-index:1}
.logo{font-size:clamp(36px,10vw,60px);font-weight:800;letter-spacing:-2px;line-height:1;position:relative;z-index:1;margin-bottom:6px}
.logo span:nth-child(1){color:var(--accent)}
.logo span:nth-child(2){color:var(--ac3)}
.logo span:nth-child(3){color:var(--ac2)}
.logo span:nth-child(4){color:var(--gold)}
.logo span:nth-child(5){color:var(--accent)}
.tagline{font-family:var(--font-mono);font-size:11px;color:var(--muted);letter-spacing:2px;margin-bottom:36px;position:relative;z-index:1}
.start-btn{background:linear-gradient(135deg,var(--accent),var(--ac2));border:none;border-radius:20px;padding:16px 52px;font-weight:700;font-size:16px;color:#fff;position:relative;z-index:1;transition:.15s}
.start-btn:hover{opacity:.9;transform:scale(1.03)}

/* ══════════════════════════════════
   DATING APP
══════════════════════════════════ */
#s-dating{background:var(--bg)}
.dating-bar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;background:var(--surface);border-bottom:.5px solid var(--border);flex-shrink:0}
.dating-logo{font-weight:800;font-size:17px;background:linear-gradient(90deg,var(--accent),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.dating-icons{display:flex;gap:14px;font-size:18px;opacity:.35}
.dating-icons span{cursor:pointer;transition:.2s}
.dating-icons span.active{opacity:1;color:var(--accent)}

.tab-row{display:flex;gap:6px;padding:10px 16px;background:var(--surface);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.tab-row::-webkit-scrollbar{display:none}
.tab{font-size:12px;padding:6px 14px;border-radius:20px;border:.5px solid var(--border);background:transparent;color:var(--muted);white-space:nowrap;transition:.2s}
.tab.on{background:var(--accent);color:#fff;border-color:var(--accent)}

.card-area{flex:1;display:flex;align-items:center;justify-content:center;padding:12px 16px;overflow:hidden;position:relative}
.pcard{width:100%;max-width:380px;background:var(--s2);border-radius:22px;border:.5px solid var(--border);overflow:hidden;max-height:100%;overflow-y:auto;scrollbar-width:none;transition:transform .35s,opacity .35s}
.pcard::-webkit-scrollbar{display:none}
.pcard.gone-r{animation:gone-r .35s forwards}
.pcard.gone-l{animation:gone-l .35s forwards}
@keyframes gone-r{to{transform:translateX(130%) rotate(12deg);opacity:0}}
@keyframes gone-l{to{transform:translateX(-130%) rotate(-12deg);opacity:0}}
.card-art{width:100%;height:240px;flex-shrink:0;position:relative;overflow:hidden}
.card-info{padding:18px}
.card-name-row{display:flex;align-items:baseline;gap:10px;margin-bottom:6px}
.card-name{font-size:22px;font-weight:700}
.card-age{font-size:16px;color:var(--muted)}
.card-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.tag{font-size:11px;padding:4px 10px;border-radius:20px;border:.5px solid var(--border);color:var(--muted);background:var(--surface);font-family:var(--font-mono)}
.card-bio{font-size:13.5px;line-height:1.65;color:#b0b0d0;margin-bottom:14px}
.card-prompts{display:flex;flex-direction:column;gap:8px}
.cprompt{background:var(--surface);border:.5px solid var(--border);border-radius:12px;padding:10px 14px}
.cprompt-q{font-size:10px;color:var(--accent);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;font-family:var(--font-mono)}
.cprompt-a{font-size:13px;color:var(--text);line-height:1.5}

.actions{display:flex;align-items:center;justify-content:center;gap:18px;padding:14px 16px 24px;flex-shrink:0}
.act{width:62px;height:62px;border-radius:50%;border:1.5px solid var(--border);background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;transition:.15s;color:#fff;line-height:1}
.act:hover{transform:scale(1.1)}
.act:active{transform:scale(.92)}
.act.like{background:rgba(157,78,221,.22);border-color:var(--accent);color:#fff;text-shadow:0 0 14px rgba(157,78,221,.85),0 0 4px rgba(255,255,255,.4);font-size:30px}
.act.nope{background:rgba(255,79,160,.18);border-color:var(--ac2);color:#ff7ab8;text-shadow:0 0 12px rgba(255,79,160,.7);font-size:24px}
.act.super{background:rgba(56,189,248,.15);border-color:var(--ac3);font-size:22px;color:var(--gold);text-shadow:0 0 10px rgba(251,191,36,.5)}
.no-more{text-align:center;padding:40px 24px;color:var(--muted);font-size:14px;line-height:1.8}

/* ─── MATCH OVERLAY ─── */
.match-ov{position:fixed;inset:0;z-index:999;background:rgba(5,5,15,.96);display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:36px 24px}
.match-ov.show{display:flex}
.m-emoji{font-size:60px;margin-bottom:18px;animation:pop .4s}
@keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
.m-title{font-size:30px;font-weight:800;color:var(--accent);margin-bottom:8px}
.m-sub{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:28px}
.m-btn{background:var(--accent);color:#fff;border:none;border-radius:16px;padding:14px 36px;font-weight:700;font-size:15px;width:100%;max-width:260px;margin-bottom:10px;transition:.2s}
.m-btn:hover{opacity:.85}
.m-btn.sec{background:transparent;border:.5px solid var(--border);color:var(--muted)}

/* ══════════════════════════════════
   CHATS LIST
══════════════════════════════════ */
#s-chats{background:var(--bg)}
.chats-bar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;background:var(--surface);border-bottom:.5px solid var(--border);flex-shrink:0}
.chats-title{font-size:18px;font-weight:700}
.chats-list{flex:1;overflow-y:auto;padding:8px 0}
.chat-item{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:.5px solid var(--border);cursor:pointer;transition:.18s}
.chat-item:hover{background:var(--surface)}
.ci-av{width:48px;height:48px;border-radius:50%;flex-shrink:0;overflow:hidden;position:relative}
.ci-av .unread{position:absolute;top:2px;right:2px;width:10px;height:10px;background:var(--accent);border-radius:50%;border:2px solid var(--bg)}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:15px;font-weight:700;margin-bottom:3px}
.ci-last{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-time{font-size:11px;color:var(--dim);font-family:var(--font-mono);flex-shrink:0}

/* ══════════════════════════════════
   GAME / CHAT
══════════════════════════════════ */
#s-game{background:var(--bg)}
.game-hdr{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--surface);border-bottom:.5px solid var(--border);flex-shrink:0}
.ghdr-back{background:none;border:none;color:var(--muted);font-size:22px;padding:4px 8px 4px 0;transition:.2s}
.ghdr-back:hover{color:var(--text)}
.ghdr-av{width:36px;height:36px;border-radius:50%;overflow:hidden;flex-shrink:0}
.ghdr-info{flex:1}
.ghdr-name{font-size:15px;font-weight:700}
.ghdr-status{font-size:11px;color:var(--ac3);font-family:var(--font-mono)}

.game-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
.game-body::-webkit-scrollbar{width:3px}
.game-body::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}

/* Scene illustration */
.scene-card{border-radius:16px;overflow:hidden;border:.5px solid var(--border);flex-shrink:0}
.scene-label{padding:10px 14px;background:var(--s2);display:flex;align-items:center;justify-content:space-between}
.scene-label-txt{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);font-family:var(--font-mono)}
.scene-sub-txt{font-size:10px;color:var(--muted);font-family:var(--font-mono)}

/* Phone messages */
.phone-ui{background:var(--s2);border:.5px solid var(--border);border-radius:20px;overflow:hidden;flex-shrink:0;max-width:340px;margin:0 auto;width:100%}
.ph-hdr{display:flex;align-items:center;gap:10px;padding:13px 14px;border-bottom:.5px solid var(--border)}
.ph-av{width:38px;height:38px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--s3)}
.ph-name{font-size:14px;font-weight:700}
.ph-st{font-size:11px;color:var(--ac3);font-family:var(--font-mono)}
.ph-msgs{padding:12px 14px 14px;display:flex;flex-direction:column;gap:8px}
.msg{display:flex;flex-direction:column}
.msg.me{align-items:flex-end}
.msg.them{align-items:flex-start}
.msg-b{max-width:230px;padding:9px 13px;border-radius:18px;font-size:13px;line-height:1.5}
.msg.them .msg-b{background:var(--bubble-them);color:#d0d0e8;border-bottom-left-radius:4px}
.msg.me .msg-b{background:var(--bubble-me);color:#fff;border-bottom-right-radius:4px}
.msg-t{font-size:10px;color:var(--dim);margin-top:3px;padding:0 4px;font-family:var(--font-mono)}
.msg-sys{text-align:center;font-size:11px;color:var(--muted);padding:4px 0;font-family:var(--font-mono)}
.typing-row{display:flex;align-items:center;gap:6px;padding:3px 0}
.tdots{display:flex;gap:3px}
.td{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:td 1.2s infinite}
.td:nth-child(2){animation-delay:.2s}
.td:nth-child(3){animation-delay:.4s}
@keyframes td{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-4px);opacity:1}}
.typing-lbl{font-size:11px;color:var(--muted);font-family:var(--font-mono)}

/* HQ block */
.hq{background:var(--s2);border:.5px solid var(--border);border-radius:16px;padding:13px 15px;flex-shrink:0}
.hq-ttl{font-size:10px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;font-family:var(--font-mono);margin-bottom:9px}
.hq-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:7px}
.hq-row:last-child{margin-bottom:0}
.hq-who{font-size:12px;font-weight:700;min-width:54px;flex-shrink:0}
.hq-who.n{color:var(--gold)}
.hq-who.d{color:var(--ac3)}
.hq-who.dm{color:var(--ac2)}
.hq-txt{font-size:13px;color:#b0b0cc;line-height:1.5}

/* Choices */
.choices{flex-shrink:0}
.choices-ttl{font-size:10px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;font-family:var(--font-mono);margin-bottom:9px}
.choice{width:100%;background:var(--s2);border:.5px solid var(--border);border-radius:14px;padding:11px 15px;margin-bottom:7px;text-align:left;transition:.18s;color:var(--text)}
.choice:hover{border-color:var(--accent);background:rgba(157,78,221,.08)}
.choice:active{transform:scale(.98)}
.choice:last-child{margin-bottom:0}
.ch-key{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;font-family:var(--font-mono)}
.ch-key.a{color:var(--accent)}
.ch-key.b{color:var(--ac3)}
.ch-key.c{color:var(--gold)}
.ch-key.d{color:var(--ac2)}
.ch-txt{font-size:13px;color:#c0c0d8;line-height:1.5}

/* Result */
.result-blk{background:var(--s2);border:.5px solid var(--border);border-radius:14px;padding:13px 15px;font-size:13px;line-height:1.7;color:#c0c0d8;flex-shrink:0}
.result-ttl{font-size:10px;letter-spacing:1.5px;color:var(--accent);text-transform:uppercase;font-family:var(--font-mono);margin-bottom:7px}

/* Loading */
.ai-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;gap:12px;flex-shrink:0}
.ai-loading-ring{width:36px;height:36px;border-radius:50%;border:2.5px solid var(--border);border-top-color:var(--accent);animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-loading-txt{font-size:13px;color:var(--muted);font-family:var(--font-mono)}

.next-btn{width:100%;background:linear-gradient(135deg,rgba(157,78,221,.15),rgba(255,79,160,.1));border:.5px solid var(--accent);border-radius:14px;padding:13px;color:var(--accent);font-weight:700;font-size:14px;transition:.2s;text-align:center;flex-shrink:0}
.next-btn:hover{background:rgba(157,78,221,.25)}

/* Ending */
.ending{text-align:center;padding:32px 20px}
.ending-em{font-size:52px;margin-bottom:16px}
.ending-tt{font-size:22px;font-weight:800;margin-bottom:8px}
.ending-tx{font-size:14px;color:#9090b0;line-height:1.7;margin-bottom:28px}

/* Bottom nav */
.bottom-nav{display:flex;align-items:center;background:var(--surface);border-top:.5px solid var(--border);flex-shrink:0}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;background:none;border:none;color:var(--muted);font-size:10px;font-family:var(--font-mono);transition:.2s;position:relative}
.bnav-btn.on{color:var(--accent)}
.bnav-icon{font-size:20px}
.bnav-badge{position:absolute;top:6px;right:calc(50% - 16px);background:var(--accent);width:8px;height:8px;border-radius:50%}

/* ══════════════════════════════════
   PROFILE (Dimka)
══════════════════════════════════ */
#s-profile{background:var(--bg)}
.profile-body{flex:1;overflow-y:auto;padding:0}
.prof-hero{padding:28px 22px 18px;background:linear-gradient(180deg,rgba(157,78,221,.12),transparent);text-align:center;border-bottom:.5px solid var(--border)}
.prof-av{width:110px;height:110px;border-radius:50%;margin:0 auto 14px;overflow:hidden;border:2px solid var(--accent);box-shadow:0 0 30px rgba(157,78,221,.3)}
.prof-name{font-size:24px;font-weight:800;margin-bottom:4px}
.prof-tag{font-family:var(--font-mono);font-size:11px;color:var(--accent);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
.prof-bio{font-size:13.5px;color:#b0b0d0;line-height:1.65;max-width:340px;margin:0 auto}
.prof-section{padding:20px 22px;border-bottom:.5px solid var(--border)}
.prof-h{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.prof-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.prof-stat{background:var(--s2);border:.5px solid var(--border);border-radius:14px;padding:14px 10px;text-align:center}
.prof-stat-v{font-size:22px;font-weight:800;color:var(--accent);font-family:var(--font-ui)}
.prof-stat-l{font-size:10px;color:var(--muted);font-family:var(--font-mono);letter-spacing:.5px;margin-top:3px}
.prof-traits{display:flex;flex-wrap:wrap;gap:7px}
.prof-trait{font-size:11px;padding:5px 11px;border-radius:14px;background:var(--s2);border:.5px solid var(--border);color:var(--text);font-family:var(--font-mono)}
.prof-trait.bad{color:var(--ac2);border-color:rgba(255,79,160,.3)}
.prof-trait.good{color:var(--ac3);border-color:rgba(56,189,248,.3)}
.prof-hq-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;background:var(--s2);border:.5px solid var(--border);border-radius:12px;padding:10px 12px}
.prof-hq-row:last-child{margin-bottom:0}
.prof-hq-av{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px}
.prof-hq-info{flex:1;min-width:0}
.prof-hq-name{font-size:13px;font-weight:700;margin-bottom:2px}
.prof-hq-desc{font-size:12px;color:var(--muted);line-height:1.5}
.prof-meter{height:8px;background:var(--s2);border-radius:6px;overflow:hidden;margin-top:6px;border:.5px solid var(--border)}
.prof-meter-fill{height:100%;background:linear-gradient(90deg,var(--ac2),var(--gold));transition:width .3s}
.prof-meter-lbl{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);font-family:var(--font-mono);margin-top:5px}
</style>
</head>
<body>
<div id="root">

<!-- INTRO -->
<div id="s-intro" class="screen active">
  <div class="intro-bg"></div>
  <div class="intro-city">
    <svg viewBox="0 0 400 180" xmlns="http://www.w3.org/2000/svg">
      <rect width="400" height="180" fill="#07070f"/>
      <circle cx="340" cy="28" r="22" fill="#fbbf24" opacity=".1"/><circle cx="340" cy="28" r="14" fill="#fbbf24" opacity=".15"/>
      <circle cx="22" cy="14" r="1" fill="#fff" opacity=".7"/><circle cx="70" cy="8" r="1.5" fill="#fff" opacity=".6"/><circle cx="140" cy="12" r="1" fill="#fff" opacity=".5"/><circle cx="200" cy="6" r="1.5" fill="#fff" opacity=".7"/><circle cx="270" cy="10" r="1" fill="#fff" opacity=".6"/><circle cx="380" cy="18" r="1" fill="#fff" opacity=".5"/>
      <rect x="0" y="80" width="45" height="100" fill="#0c0c1e"/><rect x="8" y="88" width="7" height="6" fill="#fbbf24" opacity=".5"/><rect x="20" y="88" width="7" height="6" fill="#9d4edd" opacity=".6"/><rect x="8" y="100" width="7" height="6" fill="#38bdf8" opacity=".4"/><rect x="20" y="100" width="7" height="6" fill="#fbbf24" opacity=".5"/>

/* ════════════════════════════════════════
   PIXEL ART GENERATOR
════════════════════════════════════════ */
function cityBg(w,h,seed){
  const rng=(n)=>{let x=Math.sin(seed*9301+n*49297)*233280;return x-Math.floor(x)};
  const cols=['#9d4edd','#38bdf8','#fbbf24','#ff4fa0','#a78bfa'];
  let s=`<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg"><rect width="${w}" height="${h}" fill="#07070f"/>`;
  for(let i=0;i<12;i++){
    const cx=rng(i)*w,cy=rng(i+1)*h*.6;
    s+=`<circle cx="${cx.toFixed(0)}" cy="${cy.toFixed(0)}" r="${(rng(i+2)*2+.5).toFixed(1)}" fill="#fff" opacity="${(.4+rng(i+3)*.5).toFixed(2)}"/>`;
  }
  const nb=5+Math.floor(rng(20)*4);
  for(let b=0;b<nb;b++){
    const bx=rng(b*3)*w,bw=20+rng(b*3+1)*50,bh=30+rng(b*3+2)*100;
    const by=h-bh,bc=['#0c0c1e','#0e0e22','#0d0d1c','#0f0f20'][b%4];
    s+=`<rect x="${bx.toFixed(0)}" y="${by.toFixed(0)}" width="${bw.toFixed(0)}" height="${bh.toFixed(0)}" fill="${bc}"/>`;
    const winRows=Math.floor(bh/14),winCols=Math.floor(bw/12);
    for(let r=0;r<winRows;r++)for(let c=0;c<winCols;c++){
      if(rng(b*100+r*10+c)>.35){
        const wx=bx+4+c*12,wy=by+4+r*14,wc=cols[Math.floor(rng(b*100+r*10+c+1)*cols.length)];
        s+=`<rect x="${wx.toFixed(0)}" y="${wy.toFixed(0)}" width="7" height="5" fill="${wc}" opacity="${(.3+rng(b*100+r*10+c+2)*.5).toFixed(2)}"/>`;
      }
    }
  }
  s+=`<rect x="0" y="${h-8}" width="${w}" height="8" fill="#080812"/>`;
  s+='</svg>';return s;
}

function girlPixelArt(girl){

  const bg=cityBg(280,280,seed*0.1);
  return `<svg viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
    <image href="data:image/svg+xml,${encodeURIComponent(bg)}" width="280" height="280"/>

async function callClaude(systemPrompt, userMsg){
  const resp=await fetch('/api/chat',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      system:systemPrompt,
      user:userMsg,
      max_tokens:4096
    })
  });
  if(!resp.ok){
    const err=await resp.json().catch(()=>({error:'network'}));
    throw new Error(err.error||'api_error');
  }
  const d=await resp.json();
  return d.text||'';
}

function getSystemPrompt(ch){
  const g=ch.girl;
  const histSummary=ch.history.length>0?`История игры:\n${ch.history.slice(-8).map(h=>`[${h.scene}] Игрок: ${h.choice} → Результат: ${h.outcome}`).join('\n')}`:'Это начало игры.';
  const flags=Object.keys(ch.flags).length?`Флаги состояния: ${JSON.stringify(ch.flags)}`:'';
  return `Ты — AI-движок игры PROJECT D.I.M.K.A. Генерируй сцены интерактивного dating simulator в Висбадене, 2026 год.

ДЕВУШКА: ${g.name}, ${g.age} лет, ${g.job}. ${g.personality}
БИОГРАФИЯ: ${g.bio}
АРХЕТИП: ${g.archetype}
ФАЗА ОТНОШЕНИЙ: ${ch.phase} (opening → texting → date_setup → date → afterdate → deep)
ОЧКИ ОТНОШЕНИЙ: ${ch.relationScore}/100

${histSummary}
${flags}

ПРАВИЛА:
- Игрок играет за Димку (живой, тревожный, смешной, добрый, хочет бросить курить)
- Советники: Никита (дерзко, коротко, к действию), Дэн (стратег, конкретика, мемный), Никотиновый демон (соблазняет на перекур)
- Каждая сцена: уникальное название, кинематографичное описание, диалог в мессенджере, внутренний монолог Димки, советники, 4 варианта выбора
- ВАРИАНТЫ: A=уверенный, B=нормальный, C=рискованный/странный, D=кринжовый-но-иногда-работает
- Игра ИМЕЕТ ФИНАЛ. Длительность — 15-25 сцен. Не растягивай бесконечно: к 12-й сцене явно веди к развязке, к 18-й — обязательно финал.
- Прогресс по фазам: opening (3-4 сцены) → texting (3-4) → date_setup (2-3) → date (4-6) → afterdate (2-3) → deep/финал. После каждой фазы СМЕНИ phase.
- Варианты выбора ВЛИЯЮТ на дальнейший ход: плохие выборы → девушка охладевает → возможен отказ/расставание; хорошие → развитие, свидание, близость
- ВОЗМОЖНЫЕ ВЕТКИ И ФИНАЛЫ:
  ПОЗИТИВНЫЕ: kiss (поцелуй в такси/у дома), sex_implied (секс — атмосфера, утро, без эксплицита), home_together (она зовёт к себе), morning_after (проснулись вместе), second_date (договорились о новой встрече), success_date (отличный вечер, без секса)
  СРЕДНИЕ: friends (френдзона, "ты классный, но..."), soft_end (красиво но не срослось)
  НЕГАТИВНЫЕ: rejected (отказ от свидания), walked_away (ушла со свидания), ghosted (молча пропала), told_off (послала нахуй прямо в чат) — последнее при низком скоре + кринжовых выборах
  СПЕЦИАЛЬНЫЕ: smoked_out (Димка скурился вместо момента — закурил во время разговора/свидания, демон победил), drunk_disaster (упился до такого что всё разрушил), morning_regret (проснулись вместе, но утром стало неловко и она сбежала)
- НИКОТИНОВАЯ МЕХАНИКА:
  • Демон в hq РЕГУЛЯРНО искушает (это его роль) — но это НЕ значит что Димка закурил. Демон может говорить "одну сигаретку?" каждую сцену, и это НОРМАЛЬНО.
  • Димка ФАКТИЧЕСКИ курит ТОЛЬКО когда выбор игрока явно про это (например D="перерыв на сигарету" или C="выйду покурю") И этот выбор приведён в действие.
  • Если в этой сцене Димка реально закурил (затянулся, вышел на перекур, достал сигарету) — ОБЯЗАТЕЛЬНО добавь в result поле "smoked": true. Если нет — "smoked": false (или не добавляй).
  • При ch.cigarettes >= 4 (передаётся в инструкции) финал ОБЯЗАТЕЛЬНО smoked_out.
  • НЕ делай чтобы Димка курил случайно от каждой плохой реакции девушки. Курение — это активный выбор игрока, не наказание за низкий скор.
- Стиль диалогов: живой, чатовый, с украинско-русским вайбом. МАТ ВКЛЮЧЁН — и у друзей, и у девушек когда злы. Если выбор был кринжовый/неуважительный → девушка может ответить резко: "иди нахуй", "ты серьезно?", "удали меня нахуй", "не пиши больше". Это ИГРА ВЗРОСЛАЯ, не sanitize. Девушки — живые, могут злиться, посылать, исчезать без слова.
- РЕАЛИЗМ ПОВЕДЕНИЯ: при relationScore<35 — холодные сухие ответы, "ок", "понятно", долгие паузы. При <20 — открытое раздражение, мат, угроза удалить. При <10 — уже послала и заблокировала. При >70 — игривость, флирт, инициатива от неё. При >85 — открытый интерес, приглашает к себе, тактильность.
- НЕ показывай номера сцен заранее. Не говори сколько сцен осталось.
- Каждая фаза состоит из 5-10+ под-сцен с разными развилками.

КРИТИЧНО ДЛЯ ОТКРЫТИЯ ЧАТА (фаза opening):
- ПЕРВОЕ сообщение в girlMessages ВСЕГДА должно быть ПРИВЕТСТВИЕМ — либо от девушки ("Привет!", "хай", "ну привет 👋", "Хелоу"), либо системное "Вы установили мэтч" + от Димки ("Привет, ${g.name}!").

- Первая сцена — это знакомство с нуля. Никаких "помнишь как мы...", "ты вчера сказала..."
- 2-4 сообщения максимум в первой сцене (приветствие + 1-2 фразы, чтобы Димке было что выбирать).

КРИТИЧНО: girlMessages, hq, hqReaction, choices — ВСЕГДА массивы ОБЪЕКТОВ (не строки, не массивы строк). Если это правило нарушено — ответ невалиден.

{
  "sceneTitle": "Название сцены",
  "phase": "текущая фаза",
  "visual": "кинематографичное описание 2-3 предложения",

  showLoading(body);
  try{
    const sys=getSystemPrompt(ch);
    const prompt=getScenePrompt(ch);
    const raw=await callClaude(sys,prompt);
    const json=parseJSON(raw);
    if(!json){showError(body,'Ошибка генерации. Попробуй ещё раз.');return;}
    normalizeScene(json);
    ch.phase=json.phase||ch.phase;
    if(ch.scenes.length===0) ensureGreeting(json,ch);
    renderSceneJSON(json,body,ch);
  }catch(e){
    console.error(e);
    showError(body,e.message||'Ошибка соединения. Проверь интернет.');
  }
}

/* Ensures the first scene actually starts with a greeting,
   not mid-conversation. Mutates scene in place. */
function ensureGreeting(scene,ch){
  if(!scene||!Array.isArray(scene.girlMessages)) scene.girlMessages=[];
  const msgs=scene.girlMessages;
  const isGreet=t=>/^(привет|хай|hi|hello|хелоу|здаров|hey|йоу|здравствуй|ку|алоха|добрый\s+(день|вечер|утро))/i.test((t||'').trim());
  const hasSystem=msgs.some(m=>m.from==='system');
  const firstReal=msgs.find(m=>m.from!=='system');
  if(!hasSystem){
    msgs.unshift({from:'system',text:`У вас мэтч с ${ch.girl.name}`});
  }
  if(!firstReal||!isGreet(firstReal.text)){
    // Insert a girl-side greeting right after system msg
    const sysIdx=msgs.findIndex(m=>m.from==='system');
    const greet={from:'them',text:`Привет 👋`};
    msgs.splice(sysIdx+1,0,greet);
  }
}

async function resumeScene(ch){
  const body=document.getElementById('game-body');
  body.innerHTML='';
  if(ch.scenes.length){
    const last=ch.scenes[ch.scenes.length-1];
    if(!last.resolved){
      renderSceneJSON(last.data,body,ch);
      return;
    }
  }
  await loadScene();
}

/* Normalize Gemini output — it sometimes returns strings where we expect
   objects/arrays. We coerce to canonical shape so renderers never crash. */
function normalizeHq(hq){
  if(!hq) return [];
  if(typeof hq==='string') return [{who:'n',name:'Совет',text:hq}];
  if(!Array.isArray(hq)) return [];
  return hq.map(h=>{
    if(typeof h==='string') return {who:'n',name:'Совет',text:h};
    if(h&&typeof h==='object') return {who:h.who||'n',name:h.name||'Совет',text:String(h.text||'')};
    return null;
  }).filter(Boolean);
}
function normalizeScene(s){
  if(!s||typeof s!=='object') return null;
  if(!Array.isArray(s.girlMessages)) s.girlMessages=[];
  s.girlMessages=s.girlMessages.map(m=>{
    if(typeof m==='string') return {from:'them',text:m};
    if(m&&typeof m==='object') return {from:m.from||'them',text:String(m.text||'')};
    return null;
  }).filter(Boolean);
  s.hq=normalizeHq(s.hq);
  if(!Array.isArray(s.choices)) s.choices=[];
  s.choices=s.choices.map((c,i)=>{
    const key='abcd'[i]||String.fromCharCode(97+i);
    if(typeof c==='string') return {key,text:c};
    if(c&&typeof c==='object') return {key:(c.key||key).toString().toLowerCase().slice(0,1),text:String(c.text||'')};
    return null;
  }).filter(Boolean);
  s.sceneTitle=String(s.sceneTitle||'');
  s.visual=String(s.visual||'');
  s.inner=String(s.inner||'');
  s.artType=String(s.artType||'evening_room');
  s.endScene=Boolean(s.endScene);
  if(s.endScene){
    s.endingType=String(s.endingType||'soft_end');
    s.endingText=String(s.endingText||'История завершилась.');
  }
  return s;
}
/* ════════════════════════════════════════
   ENDING ENGINE — client-side fallback
   AI постоянно увиливает от финала. Мы форсим жёстко.
════════════════════════════════════════ */
function autoPhase(sceneNum){
  if(sceneNum>=12) return 'deep';
  if(sceneNum>=10) return 'afterdate';
  if(sceneNum>=6)  return 'date';
  if(sceneNum>=4)  return 'date_setup';
  if(sceneNum>=2)  return 'texting';
  return 'opening';
}

function pickEndingType(ch){
  const score=ch.relationScore;
  const cigs=ch.cigarettes||0;
  if(cigs>=4) return 'smoked_out';
  const pick=arr=>arr[Math.floor(Math.random()*arr.length)];
  if(score>=80) return pick(['sex_implied','home_together','morning_after']);
  if(score>=65) return pick(['kiss','second_date','success_date']);
  if(score>=45) return pick(['second_date','success_date','soft_end']);
  if(score>=25) return pick(['friends','soft_end','soft_end']);
  if(score>=10) return pick(['rejected','walked_away','ghosted']);
  return 'told_off';
}

  walked_away:    g=>`${g.name} встала из-за стола посреди ужина. "Знаешь что? Я пойду." Без злости — просто устала. Счёт официант принёс тебе. Ты сидишь ещё минут двадцать, доедая пасту в одиночестве.`,

};

function artForEnding(t){
  if(t==='sex_implied'||t==='morning_after'||t==='morning_regret') return 'morning_after';
  if(t==='smoked_out') return 'night_city';
  if(t==='rejected'||t==='walked_away'||t==='ghosted'||t==='told_off'||t==='drunk_disaster') return 'breakup';
  if(t==='kiss'||t==='home_together') return 'afterdate';
  return 'afterdate';
}

function buildSyntheticEnding(ch){
  const type=pickEndingType(ch);
  const fn=FALLBACK_ENDINGS[type];
  return {
    endScene:true,
    endingType:type,
    endingText:fn?fn(ch.girl):'История завершилась.',
    artType:artForEnding(type),
    sceneTitle:'Финал',
    girlMessages:[],hq:[],choices:[],
    visual:'',inner:''
  };
}

function normalizeResult(r){
  if(!r||typeof r!=='object') return null;
  return {
    text:String(r.text||''),
    girlReply:r.girlReply?String(r.girlReply):'',
    hqReaction:normalizeHq(r.hqReaction)
  };
}

function escHTML(s){
  return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escAttr(s){
  return String(s==null?'':s).replace(/[^a-zA-Z0-9_-]/g,'');
}
function handleChoiceIdx(idx){
  const ch=S.chats[S.activeChat];
  if(!ch||!ch.scenes.length) return;
  const last=ch.scenes[ch.scenes.length-1];
  if(!last||last.resolved) return;
  const c=last.data?.choices?.[idx];
  if(!c) return;
  handleChoice(c);
}

async function handleChoice(choiceData){
  const ch=S.chats[S.activeChat];
  const body=document.getElementById('game-body');

  // Force phase progression by scene count — AI ignores phase signals
  ch.phase=autoPhase(ch.scenes.length);

  // Save choice to history
  ch.history.push({scene:ch.scenes.length,choice:choiceData.text,outcome:'pending'});
  ch.msgHistory.push({role:'assistant',content:choiceData.text});

  // Update relation score (D и cringe-C — реально жалят, A и B — стабильно растут)
  const delta={
    a:7,
    b:3,
    c:Math.random()>0.5?6:-7,
    d:Math.random()>0.55?5:-13
  };
  ch.relationScore=Math.max(0,Math.min(100,ch.relationScore+(delta[choiceData.key]||0)));

  // Show loading
  body.innerHTML='';
  showLoading(body,'Отправляем...');

  try{
    const sys=getSystemPrompt(ch);
    const sceneNum=ch.scenes.length;
    const cigs=ch.cigarettes||0;
    const FORCE_ENDING_AT=13;
    const endgameRule=
      cigs>=4?`ДЕМОН ПОБЕДИЛ. next.endScene=true, endingType=smoked_out. Кинематографичный финал про сигарету, дым, упущенный шанс — 4-5 предложений в endingText.`:
      sceneNum>=FORCE_ENDING_AT?`ОБЯЗАТЕЛЬНО ФИНАЛ ПРЯМО СЕЙЧАС. next.endScene=true БЕЗ ВАРИАНТОВ. Тип по relationScore (${ch.relationScore}): >75=sex_implied/morning_after/home_together; 60-75=kiss/second_date; 40-60=success_date/soft_end/second_date; 20-40=friends/soft_end; 5-20=rejected/walked_away/ghosted; <5=told_off (послала нахуй). endingText 4-5 предложений, кинематографично, конкретно про последний момент с ${ch.girl.name}.`:
      sceneNum>=10?`Сцена ПРЕДФИНАЛЬНАЯ. Веди к развязке прямо сейчас или в следующей сцене. endScene=true разрешено и приветствуется.`:
      sceneNum>=7?`Сцена кульминационная — пик свидания/конфликта. Можно ставить endScene если естественно.`:
      sceneNum>=3&&ch.relationScore<15?'КРАЙНЕ низкий скор. Девушка явно зла — резкий ответ, мат, может прямо послать и сделать endScene=true с told_off в этой же сцене.':
      sceneNum>=3&&ch.relationScore<25?'Низкий скор — холодные сухие ответы, видимое раздражение. Если игрок снова накосячит — endScene с ghosted/walked_away.':
      ch.relationScore>80?'Очень высокий скор — открытый флирт, инициатива от неё, тактильность.':
      ch.relationScore>65?'Хороший скор — развивай близость, тепло, движение к свиданию.':
      'Развивай сцену согласно фазе.';
    const prompt=`Игрок выбрал вариант ${choiceData.key.toUpperCase()}: "${choiceData.text}"
Очки отношений сейчас: ${ch.relationScore}/100
Фаза: ${ch.phase}
Номер сцены: ${sceneNum} (всего планируется 15-20)

ИНСТРУКЦИЯ К ЭТОЙ СЦЕНЕ: ${endgameRule}

ТЕКУЩИЕ ВЫКУРЕННЫЕ СИГАРЕТЫ В ЭТОМ ЧАТЕ: ${cigs}/4 (при 4 — обязательный smoked_out)

Верни JSON с двумя полями:
1. "result": { "text": "что произошло 2-3 предложения", "girlReply": "ответ девушки если есть", "hqReaction": [{"who":"n/d/dm","name":"...","text":"..."}], "smoked": false }
   • "smoked": true ТОЛЬКО если Димка В ЭТОЙ СЦЕНЕ реально закурил (по выбору игрока). Если просто Демон уговаривает или Никита отговаривает — smoked:false.
2. "next": { ...полная следующая сцена в стандартном формате, ЛИБО финальная сцена с endScene:true, endingType, endingText... }`;
    const raw=await callClaude(sys,prompt);
    const json=parseJSON(raw);
    if(!json){showError(body,'Ошибка. Попробуй ещё раз.');return;}

    const result=normalizeResult(json.result);
    let next=json.next?normalizeScene(json.next):null;

    // FORCE ENDING: AI любит игнорить — клиент сам тригерит финал на 13+ или при cigs>=4
    const HARD_END_AT=13;
    const mustEnd=(ch.scenes.length>=HARD_END_AT)||((ch.cigarettes||0)>=4);
    if(mustEnd){
      if(!next||!next.endScene){
        // AI не дал финал — синтезируем клиентом, текст из заготовок
        console.warn('[forceEnding] AI ignored endScene, synthesizing locally');
        next=buildSyntheticEnding(ch);
      }else if(!next.endingText||next.endingText.length<40){
        // Финал есть но текст пустой/куций — подменяем
        const syn=buildSyntheticEnding(ch);
        next.endingText=syn.endingText;
        next.endingType=next.endingType||syn.endingType;
      }
    }

    // Track smoking — structured signal first, narrow regex fallback.
    // ВАЖЛИВО: рахуємо тільки коли Димка ФАКТИЧНО закурив, не коли Демон/штаб згадує сигарети.
    let smoked=false;
    if(json.result && json.result.smoked===true) smoked=true;
    if(!smoked){
      // Tight regex: past-tense action verbs only, in result.text (not in hq, not in inner)
      const tight=/\b(закурил|затянулся|затянулась|выкурил|задымил|зажёг сигарету|зажег сигарету|достал пачку)\b/i;
      if(tight.test(result?.text||'')) smoked=true;
    }
    if(smoked){
      ch.cigarettes=(ch.cigarettes||0)+1;
      S.cigarettes=(S.cigarettes||0)+1; // lifetime stat for profile
    }

    // Update history
    if(ch.history.length) ch.history[ch.history.length-1].outcome=result?.text||'';

    // Render result + next scene
    renderResult(result,body,ch);
    if(next){
      if(next.endScene){
        renderEnding(next,body,ch);
      } else {
        ch.phase=next.phase||ch.phase;
        renderNextScene(next,body,ch);
      }
    }
  }catch(e){
    console.error(e);
    showError(body,'Ошибка. Попробуй ещё раз.');
  }
}

function showLoading(body, txt='Генерируем сцену...'){
  body.innerHTML=`<div class="ai-loading"><div class="ai-loading-ring"></div><div class="ai-loading-txt">${txt}</div></div>`;
}
function showError(body, txt){
  body.innerHTML=`<div style="text-align:center;padding:32px 20px;color:var(--muted)"><div style="font-size:28px;margin-bottom:12px">⚠️</div><div style="font-size:13px">${txt}</div><button onclick="loadScene()" style="margin-top:16px;background:var(--accent);border:none;border-radius:12px;padding:10px 24px;color:#fff;font-weight:700;cursor:pointer;font-family:var(--font-ui)">Повторить</button></div>`;
}

    <div class="phone-ui">

      </div>

function renderResult(result, body, ch){
  if(!result) return;
  const g=ch.girl;
  let html=`<div class="result-blk"><div class="result-ttl">Результат</div>${escHTML(result.text||'')}</div>`;
  if(result.girlReply){
    html+=`<div class="phone-ui"><div class="ph-hdr"><div class="ph-av">${smallAvatar(g,38)}</div><div><div class="ph-name">${escHTML(g.name)}</div><div class="ph-st">только что</div></div></div><div class="ph-msgs"><div class="msg them"><div class="msg-b">${escHTML(result.girlReply)}</div></div></div></div>`;
  }
  if(result.hqReaction?.length){
    const hq=result.hqReaction.map(h=>`<div class="hq-row"><span class="hq-who ${escAttr(h.who)}">${escHTML(h.name)}:</span><span class="hq-txt">${escHTML(h.text)}</span></div>`).join('');
    html+=`<div class="hq"><div class="hq-ttl">Реакция штаба</div>${hq}</div>`;
  }
  body.innerHTML=html;
}

function renderNextScene(scene, body, ch){
  const g=ch.girl;
  const seed=g.id.charCodeAt(0)*7+(ch.scenes.length*13);
  const msgs=(scene.girlMessages||[]).map(m=>{
    const t=escHTML(m.text);
    if(m.from==='system') return `<div class="msg-sys">${t}</div>`;
    if(m.from==='me') return `<div class="msg me"><div class="msg-b">${t}</div></div>`;

    ${scene.inner?`<div style="font-size:13px;color:#9090c0;font-style:italic;line-height:1.65;border-left:2px solid var(--accent);padding:8px 12px;background:var(--s2);border-radius:0 12px 12px 0">${escHTML(scene.inner)}</div>`:''}

function parseJSON(str){
  try{
    // Try direct parse
    return JSON.parse(str);
  }catch(e){
    // Try extract from markdown
    const m=str.match(/```(?:json)?\s*([\s\S]*?)```/);
    if(m)try{return JSON.parse(m[1].trim())}catch(e2){}
    // Try find { }
    const s=str.indexOf('{'),en=str.lastIndexOf('}');
    if(s>=0&&en>s)try{return JSON.parse(str.slice(s,en+1))}catch(e3){}
    return null;
  }
}
function phaseLabel(p){
  const labels={opening:'Знакомство',texting:'Переписка',date_setup:'Договариваемся',date:'Свидание',afterdate:'После',deep:'Близость'};
  return labels[p]||p||'';
}
function endingLabel(t){
  const labels={
    success_date:'Отличный вечер',kiss:'Поцелуй',home_together:'Пошли к ней',
    soft_end:'Красиво, но...',rejected:'Отказ',walked_away:'Ушла',
    ghosted:'Пропала',friends:'Просто друзья',sex_implied:'Остался на ночь',
    morning_after:'Утро после',second_date:'До следующего раза',
    smoked_out:'Скурился',told_off:'Послала нахуй',drunk_disaster:'Упился в хлам',morning_regret:'Утро сожаления'
  };
  return labels[t]||'Конец истории';
}

    if(b) b.scrollTop=b.scrollHeight;
  },100);
}
